name: 補助金データ自動更新

on:
  schedule:
    - cron: "0 0 * * *" # 毎朝9:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 最新データ取得
        run: python fetch_data.py
        env:
          TZ: Asia/Tokyo
      - name: スナップショットをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "データ自動更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
